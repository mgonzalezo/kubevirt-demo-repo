apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-ai-workload
spec:
  running: true
  template:
    spec:
      domain:
        resources:
          requests:
            memory: 8Gi
          limits:
            memory: 4Gi
        devices:
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}
      networks:
      - name: default
        pod: {}
      volumes:
      - name: containerdisk
        containerDisk:
          image: quay.io/kubevirt/fedora-cloud-container-disk-demo
